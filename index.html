<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>塔城市智慧乡村</title>
  </head>
  <body>
    <div id="app"></div>
    <script
      type="text/javascript"
      src="https://res.wx.qq.com/open/js/jweixin-1.3.2.js"
    ></script>
    <script type="module" src="/src/main.js"></script>
    <script>
      /**
       * 获取URL中的查询参数，并返回一个键值对对象。
       * @returns {Object} 包含所有查询参数的键值对对象
       */
      function getUrlParams() {
        try {
          // 创建一个URLSearchParams对象，用于解析URL中的查询字符串
          const urlParams = new URLSearchParams(window.location.search);
          // 初始化一个空对象，用于存储解析后的参数
          const params = {};
          // 遍历URLSearchParams对象中的每一个参数，将其添加到params对象中
          urlParams.forEach((value, key) => {
            params[key] = value;
          });
          // 返回包含所有参数的键值对对象
          return params;
        } catch (error) {
          console.error("Failed to parse URL parameters:", error);
          return {};
        }
      }

      const params = getUrlParams();
      if (params.token) {
        localStorage.setItem("Token", params.token);
      }
      if (params.region) {
        localStorage.setItem("Region", params.region);
      }
      if (params.pageType) {
        localStorage.setItem("PageType", params.pageType);
      }
      if (params.lng) {
        localStorage.setItem("Lng", params.lng);
      }
      if (params.lat) {
        localStorage.setItem("Lat", params.lat);
      }
    </script>
  </body>
</html>
